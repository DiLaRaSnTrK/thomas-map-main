<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Girişi — Thomas Stevens</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --parchment: #f5e6c8;
      --ink-brown: #3b200a;
      --gold: #c9973a;
      --gold-light: #e8c07a;
      --gold-dim: #a07830;
      --red-accent: #8b2a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0401;
      background-image:
        radial-gradient(ellipse at 30% 50%, rgba(60,25,5,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(40,15,2,0.3) 0%, transparent 50%);
      font-family: 'EB Garamond', serif;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: absolute; inset: 0;
      background-image: url('/static/images/backgrnd.png');
      background-size: cover; background-position: center; opacity: 0.04;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 20px;
    }

    /* Logo area */
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo-img {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 20px rgba(201,151,58,0.35);
      object-fit: cover;
    }
    .login-logo-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; color: var(--gold-light);
      margin-top: 12px; display: block;
      text-shadow: 0 0 20px rgba(201,151,58,0.3);
    }
    .login-logo-sub {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem; color: var(--gold-dim);
      letter-spacing: 0.2em; margin-top: 4px; display: block;
    }

    /* Card */
    .login-card {
      background: linear-gradient(160deg, rgba(253,245,224,0.97) 0%, rgba(240,224,176,0.97) 100%);
      border-radius: 14px;
      border: 2px solid var(--gold-dim);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(201,151,58,0.1);
      padding: 36px 32px 30px;
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
    }

    .login-card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem; font-weight: 700;
      color: var(--gold-dim); letter-spacing: 0.2em;
      text-transform: uppercase; text-align: center;
      margin-bottom: 22px;
    }

    /* Error alert */
    .login-error {
      background: rgba(139,42,26,0.1);
      border: 1px solid rgba(139,42,26,0.4);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      color: var(--red-accent);
      letter-spacing: 0.04em;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem; font-weight: 700;
      color: var(--ink-brown); letter-spacing: 0.1em;
      text-transform: uppercase; display: block;
      margin-bottom: 7px;
    }
    .form-input-wrap { position: relative; }
    .form-input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--gold-dim); font-size: 0.85rem;
    }
    .form-control {
      width: 100%;
      background: rgba(255,250,240,0.9);
      border: 1.5px solid var(--gold-dim);
      border-radius: 8px;
      padding: 10px 12px 10px 36px;
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: var(--ink-brown);
      transition: all 0.25s;
      outline: none;
    }
    .form-control:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,151,58,0.15);
      background: #fff;
    }

    /* Submit */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--ink-brown) 0%, #5a2a0a 100%);
      color: var(--gold-light);
      border: 1px solid var(--gold-dim);
      border-radius: 25px;
      padding: 11px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 6px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #5a2a0a 0%, var(--gold-dim) 100%);
      color: var(--parchment);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    /* Back link */
    .back-link {
      text-align: center; margin-top: 20px;
    }
    .back-link a {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      color: rgba(245,230,200,0.45);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .back-link a:hover { color: var(--gold-dim); }

    /* Divider inside card */
    .card-divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 0 auto 22px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-logo">
      <img src="/static/images/Logo.png" alt="Logo" class="login-logo-img">
      <span class="login-logo-title">Thomas Stevens</span>
      <span class="login-logo-sub">YÖNETİM PANELİ</span>
    </div>

    <div class="login-card">
      <div class="login-card-title">Kimlik Doğrulama</div>
      <div class="card-divider"></div>

      {% if error %}
      <div class="login-error">
        <i class="fas fa-exclamation-triangle"></i>
        Kullanıcı adı veya şifre hatalı.
      </div>
      {% endif %}

      <form method="post" action="/yonetim-giris">
        <div class="form-group">
          <label class="form-label">Kullanıcı Adı</label>
          <div class="form-input-wrap">
            <i class="fas fa-user form-input-icon"></i>
            <input type="text" name="username" class="form-control"
                   placeholder="Kullanıcı adınız" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <div class="form-input-wrap">
            <i class="fas fa-lock form-input-icon"></i>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap
        </button>
      </form>
    </div>

    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left me-1"></i>Ana Sayfaya Dön</a>
    </div>

  </div>
</body>
</html>
