<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli - Stevens Dünya Turu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("/static/images/backgrnd.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
            padding-top: 80px;
        }

        .navbar { background-color: rgba(43, 25, 0, 0.85) !important; }
        .navbar-brand, .nav-link { color: #dabc9a !important; font-size: 20px; }

        .container-box {
            background-color: rgba(43, 25, 0, 0.85);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            color: #dabc9a;
            margin-bottom: 50px;
        }

        h2 { font-family: 'Tangerine', cursive; font-size: 45px; color: #dabc9a; margin-bottom: 1.5rem; }
        .form-label { color: #f5e6c4; font-weight: 500; }
        .form-control, .form-select { border-radius: 10px; background-color: rgba(255,255,255,0.9); }

        .btn-success { background-color: #dabc9a; color: #2b1900; font-weight: 600; border-radius: 20px; border: none; }
        .btn-success:hover { background-color: #e8cda8; }
        .btn-info { background-color: #5bc0de; border-radius: 15px; color: white; border: none; }
        
        table.table { background-color: rgba(0,0,0,0.3); color: #fff; }
        table.table thead.table-dark th { background-color: rgba(43,25,0,0.95); color: #dabc9a; }
        .btn-primary { background-color: #dabc9a; color: #2b1900; border: none; border-radius: 15px; }
        .btn-danger { background-color: #c94c4c; border-radius: 15px; border: none; }

        .alert {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thomas Stevens Admin</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link btn btn-outline-light ms-2" href="/logout">Çıkış Yap</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container container-box mt-4">
    <div id="alert-placeholder"></div>

    <h2>Yeni Yer Ekle</h2>
    <form method="post" action="/yonetim/ekle" class="row g-3 mb-5">
        <div class="col-md-4">
            <label class="form-label">Konum Adı</label>
            <input type="text" name="name_modern" class="form-control" placeholder="Örn: İstanbul" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Seyahat Tarihi</label>
            <input type="text" name="date" class="form-control" placeholder="Örn: 02.07.1885" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Ulaşım Aracı</label>
            <input type="text" name="transport_type" class="form-control" placeholder="Bisiklet, Gemi, Tren...">
        </div>
        
        <div class="col-md-4">
            <label class="form-label">Enlem (Latitude)</label>
            <input type="number" step="any" name="latitude" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Boylam (Longitude)</label>
            <input type="number" step="any" name="longitude" class="form-control" required>
        </div>
        <div class="col-md-4 d-flex align-items-center mt-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_in_ottoman" id="ottomanCheck">
                <label class="form-check-label" for="ottomanCheck">Osmanlı Toprağı mı?</label>
            </div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Açıklama (TR)</label>
            <textarea id="desc_tr" name="description_tr" class="form-control" rows="4"></textarea>
            <button type="button" onclick="autoTranslate()" class="btn btn-sm btn-info mt-2">İngilizceye Çevir ✨</button>
        </div>
        <div class="col-md-6">
            <label class="form-label">Açıklama (EN)</label>
            <textarea id="desc_en" name="description_en" class="form-control" rows="4"></textarea>
        </div>

        <div class="col-md-6">
            <label class="form-label">Görsel Seçimi</label>
            <select name="image_url" class="form-select">
                <option value="vintage.png">Varsayılan (Vintage)</option>
                <option value="9.png">Görsel 9</option>
                <option value="brown.png">Kahverengi Kağıt</option>
            </select>
        </div>

        <div class="col-12 text-end">
            <button type="submit" class="btn btn-success px-5">Ekle</button>
        </div>
    </form>

    <hr class="my-5" style="border-color: #dabc9a;">

    <h2>Mevcut Yerler</h2>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Konum Adı</th>
                <th>Ulaşım</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody>
            {% for place in places %}
            <tr>
                <td>{{ place.id }}</td>
                <td>{{ place.name_modern }}</td>
                <td>{{ place.transport_type or '-' }}</td>
                <td>
                    <a class="btn btn-primary btn-sm me-2" href="/yonetim/duzenle/{{ place.id }}">Düzenle</a>
                    <a class="btn btn-danger btn-sm" href="/yonetim/sil/{{ place.id }}">Sil</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const msg = urlParams.get('msg');

if (msg) {
    const placeholder = document.getElementById('alert-placeholder');
    let text = "";
    let type = "alert-success";

    if (msg === "added") text = "✅ Yeni konum başarıyla eklendi!";
    if (msg === "updated") text = "📝 Kayıt başarıyla güncellendi!";
    if (msg === "deleted") { text = "🗑️ Kayıt silindi."; type = "alert-warning"; }

    placeholder.innerHTML = `
        <div class="alert ${type} alert-dismissible fade show" role="alert">
            ${text}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    `;

    setTimeout(() => {
        const alert = document.querySelector('.alert');
        if (alert) {
            const bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        }
        window.history.replaceState({}, document.title, "/yonetim");
    }, 3000);
}

async function autoTranslate() {
    const text = document.getElementById('desc_tr').value;
    if(!text) { alert("Lütfen önce Türkçe açıklamayı girin!"); return; }

    const response = await fetch('/yonetim/cevir', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    });
    
    if (response.ok) {
        const data = await response.json();
        document.getElementById('desc_en').value = data.translated_text;
    } else {
        alert("Çeviri sırasında bir hata oluştu.");
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
