<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Düzenle - Stevens Haritası</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("/static/images/backgrnd.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 50px 0;
        }
        .container-box {
            background-color: rgba(43, 25, 0, 0.9);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            color: #dabc9a;
        }
        h2 { font-family: 'Tangerine', cursive; font-size: 45px; color: #dabc9a; }
        .form-label { color: #f5e6c4; font-weight: 500; }
        .form-control, .form-select { border-radius: 10px; background-color: rgba(255,255,255,0.9); }
        .btn-success { background-color: #dabc9a; color: #2b1900; font-weight: 600; border-radius: 20px; border: none; }
        .btn-success:hover { background-color: #e8cda8; }
        .btn-info { background-color: #5bc0de; border-radius: 15px; color: white; border: none; }
        .btn-secondary { border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box shadow">
        <h2 class="mb-4">Yeri Düzenle: {{ place.name_modern }}</h2>
        <form method="post">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Konum Adı (Modern)</label>
                    <input type="text" name="name_modern" class="form-control" value="{{ place.name_modern }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Seyahat Tarihi</label>
                    <input type="text" name="date" class="form-control" value="{{ place.date }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ulaşım Aracı</label>
                    <input type="text" name="transport_type" class="form-control" value="{{ place.transport_type or '' }}" placeholder="Bisiklet, Gemi, Tren...">
                </div>
                
                <div class="col-md-4">
                    <label class="form-label">Enlem</label>
                    <input type="number" step="any" name="latitude" class="form-control" value="{{ place.latitude }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Boylam</label>
                    <input type="number" step="any" name="longitude" class="form-control" value="{{ place.longitude }}" required>
                </div>
                <div class="col-md-4 d-flex align-items-center mt-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_in_ottoman" id="ottomanCheck" {% if place.is_in_ottoman %}checked{% endif %}>
                        <label class="form-check-label" for="ottomanCheck">Osmanlı Toprağı mı?</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Açıklama (TR)</label>
                    <textarea id="edit_desc_tr" name="description_tr" class="form-control" rows="5">{{ place.description_tr }}</textarea>
                    <button type="button" onclick="autoTranslate()" class="btn btn-sm btn-info mt-2">Yeniden Çevir ✨</button>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Açıklama (EN)</label>
                    <textarea id="edit_desc_en" name="description_en" class="form-control" rows="5">{{ place.description_en }}</textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Görsel Seçimi</label>
                    <select name="image_url" class="form-select">
                        <option value="vintage.png" {% if place.image_url == 'vintage.png' %}selected{% endif %}>Varsayılan (Vintage)</option>
                        <option value="9.png" {% if place.image_url == '9.png' %}selected{% endif %}>Görsel 9</option>
                        <option value="brown.png" {% if place.image_url == 'brown.png' %}selected{% endif %}>Kahverengi Kağıt</option>
                    </select>
                </div>

                <div class="col-12 mt-4 text-end">
                    <a href="/yonetim" class="btn btn-secondary me-2">Vazgeç</a>
                    <button type="submit" class="btn btn-success px-4">Değişiklikleri Kaydet</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
async function autoTranslate() {
    const text = document.getElementById('edit_desc_tr').value;
    if(!text) { alert("Lütfen önce Türkçe açıklamayı girin!"); return; }

    const response = await fetch('/yonetim/cevir', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    });
    
    if (response.ok) {
        const data = await response.json();
        document.getElementById('edit_desc_en').value = data.translated_text;
    } else {
        alert("Çeviri sırasında bir hata oluştu.");
    }
}
</script>

</body>
</html>
